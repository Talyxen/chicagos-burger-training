version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: chicago_user
      POSTGRES_PASSWORD: chicago_password
      POSTGRES_DB: chicago_burger
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
